services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atrium
      POSTGRES_PASSWORD: atrium
      POSTGRES_DB: atrium
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atrium"]
      interval: 5s
      timeout: 5s
      retries: 5

  atrium:
    image: vibralabs/atrium:latest
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgresql://atrium:atrium@postgres:5432/atrium"
      BETTER_AUTH_SECRET: "change-me-to-a-random-string-at-least-32-chars"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
